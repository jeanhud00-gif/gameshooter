<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Shooter 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      cursor: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Musique
    const music = new Audio('ivy.mp3');
    music.loop   = true;
    music.volume = 0.4;
    function startMusic() {
      if (!music.paused) return;
      music.play().catch(() => {});
    }
    // Tentative autoplay immédiate (marche si le navigateur l'autorise)
    startMusic();
    // Fallback : clavier / souris / touch
    document.addEventListener('keydown',    startMusic);
    document.addEventListener('mousedown',  startMusic);
    document.addEventListener('touchstart', startMusic);

    function getMapSize() {
      return { w: window.innerWidth, h: window.innerHeight };
    }

    let { w: MAP_W, h: MAP_H } = getMapSize();
    canvas.width  = MAP_W;
    canvas.height = MAP_H;
    const isMobile = navigator.maxTouchPoints > 0;

    // Space background offscreen
    const grassCanvas = document.createElement('canvas');
    const gCtx = grassCanvas.getContext('2d');
    function buildGrass() {
      grassCanvas.width  = MAP_W;
      grassCanvas.height = MAP_H;

      // Fond noir profond
      gCtx.fillStyle = '#06060f';
      gCtx.fillRect(0, 0, MAP_W, MAP_H);

      // Nébuleuses — blobs colorés flous
      const nebulas = [
        { x: MAP_W * 0.18, y: MAP_H * 0.25, r: MAP_H * 0.32, c1: 'rgba(40,0,80,0.55)',  c2: 'rgba(0,0,0,0)' },
        { x: MAP_W * 0.75, y: MAP_H * 0.65, r: MAP_H * 0.28, c1: 'rgba(0,30,80,0.50)',  c2: 'rgba(0,0,0,0)' },
        { x: MAP_W * 0.55, y: MAP_H * 0.20, r: MAP_H * 0.22, c1: 'rgba(60,0,60,0.38)',  c2: 'rgba(0,0,0,0)' },
        { x: MAP_W * 0.30, y: MAP_H * 0.78, r: MAP_H * 0.25, c1: 'rgba(0,40,70,0.42)',  c2: 'rgba(0,0,0,0)' },
        { x: MAP_W * 0.88, y: MAP_H * 0.18, r: MAP_H * 0.18, c1: 'rgba(80,10,40,0.35)', c2: 'rgba(0,0,0,0)' },
      ];
      for (const n of nebulas) {
        const grad = gCtx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        grad.addColorStop(0, n.c1);
        grad.addColorStop(1, n.c2);
        gCtx.fillStyle = grad;
        gCtx.beginPath();
        gCtx.ellipse(n.x, n.y, n.r, n.r * 0.65, Math.random() * Math.PI, 0, Math.PI * 2);
        gCtx.fill();
      }

      // Étoiles lointaines (petites, blanches/bleues)
      for (let i = 0; i < 320; i++) {
        const x = Math.random() * MAP_W;
        const y = Math.random() * MAP_H;
        const r = Math.random() * 0.8 + 0.2;
        const alpha = Math.random() * 0.5 + 0.3;
        const hue = Math.random() > 0.8 ? `rgba(180,200,255,${alpha})` : `rgba(255,255,255,${alpha})`;
        gCtx.fillStyle = hue;
        gCtx.beginPath();
        gCtx.arc(x, y, r, 0, Math.PI * 2);
        gCtx.fill();
      }

      // Étoiles brillantes (plus grosses, avec halo)
      for (let i = 0; i < 28; i++) {
        const x = Math.random() * MAP_W;
        const y = Math.random() * MAP_H;
        const r = Math.random() * 1.4 + 0.8;
        gCtx.save();
        gCtx.globalAlpha = Math.random() * 0.35 + 0.15;
        gCtx.fillStyle = 'white';
        gCtx.beginPath(); gCtx.arc(x, y, r * 3, 0, Math.PI * 2); gCtx.fill();
        gCtx.globalAlpha = 1;
        gCtx.fillStyle = 'white';
        gCtx.beginPath(); gCtx.arc(x, y, r, 0, Math.PI * 2); gCtx.fill();
        gCtx.restore();
      }

      // Grille subtile (style space-grid)
      const gridSize = 80;
      gCtx.strokeStyle = 'rgba(255,255,255,0.025)';
      gCtx.lineWidth = 1;
      for (let x = 0; x < MAP_W; x += gridSize) {
        gCtx.beginPath(); gCtx.moveTo(x, 0); gCtx.lineTo(x, MAP_H); gCtx.stroke();
      }
      for (let y = 0; y < MAP_H; y += gridSize) {
        gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(MAP_W, y); gCtx.stroke();
      }

      // Bordure
      gCtx.strokeStyle = 'rgba(80,120,255,0.4)';
      gCtx.lineWidth = 3;
      gCtx.strokeRect(2, 2, MAP_W - 4, MAP_H - 4);
    }
    buildGrass();

    // Player stats
    const BASE_MAX_HP  = 7;
    const BASE_SPEED   = 3;
    const BASE_FIRE_CD = 15;

    const RADIUS       = 15;
    const ENEMY_RADIUS = 18;

    const player = {
      x: MAP_W / 2, y: MAP_H / 2, angle: 0,
      vx: 0, vy: 0,
      hp: BASE_MAX_HP, maxHp: BASE_MAX_HP,
      speed: BASE_SPEED,
      fireCD: BASE_FIRE_CD,
      fireCDTimer: 0,
      circleFire: 0,
    };

    const keys  = {};
    const mouse = { x: MAP_W / 2, y: MAP_H / 2, down: false };

    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);
    window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; mouse.down = false; });

    // Gamepad
    function getGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const pad of pads) if (pad) return pad;
      return null;
    }
    let gpPrevStart = false;
    let gpFire = false;

    // Joysticks tactiles
    const JOY_RADIUS = 70;
    const JOY_KNOB   = 28;
    const joyL = { active: false, id: -1, baseX: 0, baseY: 0, dx: 0, dy: 0 };
    const joyR = { active: false, id: -1, baseX: 0, baseY: 0, dx: 0, dy: 0 };
    let touchFire = false;

    function canvasCoords(touch) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (touch.clientX - rect.left) * (canvas.width  / rect.width),
        y: (touch.clientY - rect.top)  * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (player.hp <= 0) { restartGame(); return; }
      for (const t of e.changedTouches) {
        const { x, y } = canvasCoords(t);
        if (x < MAP_W / 2) {
          if (!joyL.active) { joyL.active = true; joyL.id = t.identifier; joyL.baseX = x; joyL.baseY = y; joyL.dx = 0; joyL.dy = 0; }
        } else {
          if (!joyR.active) { joyR.active = true; joyR.id = t.identifier; joyR.baseX = x; joyR.baseY = y; joyR.dx = 0; joyR.dy = 0; }
        }
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const { x, y } = canvasCoords(t);
        for (const joy of [joyL, joyR]) {
          if (joy.id !== t.identifier) continue;
          const ddx = x - joy.baseX, ddy = y - joy.baseY;
          const len = Math.hypot(ddx, ddy) || 1;
          const clamped = Math.min(len, JOY_RADIUS);
          joy.dx = (ddx / len) * (clamped / JOY_RADIUS);
          joy.dy = (ddy / len) * (clamped / JOY_RADIUS);
        }
      }
    }, { passive: false });

    function onTouchEnd(e) {
      e.preventDefault();
      for (const t of e.changedTouches) {
        for (const joy of [joyL, joyR]) {
          if (joy.id === t.identifier) { joy.active = false; joy.id = -1; joy.dx = 0; joy.dy = 0; }
        }
      }
    }
    canvas.addEventListener('touchend',    onTouchEnd, { passive: false });
    canvas.addEventListener('touchcancel', onTouchEnd, { passive: false });

    function drawJoysticks() {
      if (!isMobile) return;
      const ghostY = MAP_H * 0.78;

      // Zones fantômes (toujours visibles, très discrètes)
      const ghosts = [
        { x: MAP_W * 0.18, joy: joyL, icon: '✜' },
        { x: MAP_W * 0.82, joy: joyR, icon: '◎' },
      ];
      for (const { x, joy, icon } of ghosts) {
        if (joy.active) continue;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, ghostY, JOY_RADIUS, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(x, ghostY, JOY_KNOB, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // Joysticks actifs
      for (const joy of [joyL, joyR]) {
        if (!joy.active) continue;
        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(joy.baseX, joy.baseY, JOY_RADIUS, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.42;
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(joy.baseX + joy.dx * JOY_RADIUS, joy.baseY + joy.dy * JOY_RADIUS, JOY_KNOB, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    canvas.addEventListener('mousedown', () => mouse.down = true);
    canvas.addEventListener('mouseup',   () => mouse.down = false);

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      mouse.x = (e.clientX - rect.left) * scaleX;
      mouse.y = (e.clientY - rect.top)  * scaleY;
      player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    });

    // Resize : adapte le canvas à la nouvelle taille de fenêtre
    window.addEventListener('resize', () => {
      ({ w: MAP_W, h: MAP_H } = getMapSize());
      canvas.width  = MAP_W;
      canvas.height = MAP_H;
      buildGrass();
      player.x = Math.max(RADIUS, Math.min(MAP_W - RADIUS, player.x));
      player.y = Math.max(RADIUS, Math.min(MAP_H - RADIUS, player.y));
    });

    // Bullets
    const playerBullets = [];
    const enemyBullets  = [];

    // Drops
    const drops = [];
    const DROP_RADIUS = 10;
    const DROP_TYPES  = ['speed', 'firerate'];
    const DROP_COLORS = { speed: '#00ccff', firerate: '#ffaa00', hp: '#ff4488', clearbullets: '#ffffff', circlefire: '#ff9900' };
    const DROP_ICONS  = { speed: '⚡', firerate: '🔥', hp: '❤', clearbullets: '✨', circlefire: '🌀' };
    const DROP_LABELS = { speed: 'VITESSE', firerate: 'CADENCE', hp: 'VIE', clearbullets: 'PURGE !', circlefire: 'CERCLE DE FEU' };
    let screenFlash = 0;

    const notifications = [];

    // Graphique projectiles


    // Timer & meilleurs temps
    let kills = 0;
    let gameStartTime = Date.now();
    let finalTime     = 0;
    let scoreSaved    = false;
    const hpHistory   = [];
    let hpSampleTick  = 0;

    function updateHpHistory() {
      hpSampleTick++;
      if (hpSampleTick % 20 !== 0) return;
      hpHistory.push({ t: finalTime, hp: player.hp });
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
    }

    function loadBestTimes() {
      try {
        return (JSON.parse(localStorage.getItem('shooter_best_times')) || [])
          .map(e => typeof e === 'number' ? { ms: e, kills: 0 } : e)
          .filter(e => e.ms < 3600000 * 2); // ignore scores > 2h (corrompus)
      } catch { return []; }
    }
    // Nettoie une fois les scores corrompus déjà en mémoire
    localStorage.setItem('shooter_best_times', JSON.stringify(loadBestTimes()));

    function saveBestTime(ms, kills) {
      const times = loadBestTimes();
      times.push({ ms, kills });
      times.sort((a, b) => b.ms - a.ms);
      localStorage.setItem('shooter_best_times', JSON.stringify(times.slice(0, 3)));
    }

    function spawnDrop(x, y) {
      if (Math.random() < 0.01) {
        drops.push({ x, y, type: 'circlefire', age: 0 });
        return;
      }
      // 0.5% de chance de drop clearbullets, indépendant du reste
      if (Math.random() < 0.01) {
        drops.push({ x, y, type: 'clearbullets', age: 0 });
        return;
      }
      if (Math.random() < 0.04) { drops.push({ x, y, type: 'hp', age: 0 }); return; }
      if (Math.random() > 0.5) return;
      const available = DROP_TYPES.filter(t =>
        !(t === 'speed'    && player.speed   >= 8) &&
        !(t === 'firerate' && player.fireCD  <= 1)
      );
      if (available.length === 0) return;
      const type = available[Math.floor(Math.random() * available.length)];
      drops.push({ x, y, type, age: 0 });
    }

    function applyDrop(type) {
      if (type === 'speed') {
        player.speed = Math.min(player.speed + 0.8, 8);
      } else if (type === 'firerate') {
        player.fireCD = Math.max(player.fireCD - 3, 1);
      } else if (type === 'hp') {
        player.hp = Math.min(player.hp + 2, Math.min(player.maxHp + 2, 15));
        player.maxHp = Math.min(Math.max(player.maxHp, player.hp), 15);
      } else if (type === 'clearbullets') {
        enemyBullets.length = 0;
        screenFlash = 18;
      } else if (type === 'circlefire') {
        player.circleFire = 1800; // 30s à 60fps
      }
      notifications.push({ text: `✨ ${DROP_LABELS[type]}`, color: DROP_COLORS[type], age: 0, x: player.x, y: player.y - 40 });
    }

    function updateDrops() {
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        d.age++;
        if (d.age > 300) { drops.splice(i, 1); continue; }
        if (dist(d, player) < RADIUS + DROP_RADIUS) {
          applyDrop(d.type);
          drops.splice(i, 1);
        }
      }
    }

    function drawDrops() {
      for (const d of drops) {
        const pulse = 1 + 0.15 * Math.sin(d.age * 0.15);
        const r = DROP_RADIUS * pulse;
        const alpha = d.age > 240 ? 1 - (d.age - 240) / 60 : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowColor = DROP_COLORS[d.type];
        ctx.shadowBlur = 12;
        ctx.fillStyle = DROP_COLORS[d.type];
        ctx.beginPath();
        ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = `bold ${r + 4}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'white';
        ctx.fillText(DROP_ICONS[d.type], d.x, d.y);
        ctx.restore();
      }
      ctx.textBaseline = 'alphabetic';
    }

    function drawNotifications() {
      for (let i = notifications.length - 1; i >= 0; i--) {
        const n = notifications[i];
        n.age++;
        n.y -= 0.5;
        const alpha = Math.max(0, 1 - n.age / 60);
        if (alpha <= 0) { notifications.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = n.color;
        ctx.fillText(n.text, n.x, n.y);
        ctx.restore();
      }
      ctx.textAlign = 'left';
    }

    // Difficulté dynamique (basée sur le temps de survie)
    let diff = {};
    function updateDifficulty() {
      const t = finalTime / 1000; // secondes écoulées
      diff = {
        spawnInterval: Math.max(48,  Math.round(160 - t * 0.50 - Math.max(0, (t - 150) * 0.18))),
        enemySpeed:    1.4,
        enemyHp:       2,
        bulletFast:    3.2,
        bulletSlow:    2.5,
        shootCD:       110,
        niveau:        Math.min(10,  Math.floor(1 + t / 30)),
      };
    }

    updateDifficulty(); // initialise diff avec les valeurs de base

    // Enemies
    const enemies = [];
    let spawnTimer = 0;

    function spawnEnemy() {
      let x, y;
      const side = Math.floor(Math.random() * 4);
      if (side === 0)      { x = Math.random() * MAP_W; y = 0; }
      else if (side === 1) { x = MAP_W; y = Math.random() * MAP_H; }
      else if (side === 2) { x = Math.random() * MAP_W; y = MAP_H; }
      else                 { x = 0; y = Math.random() * MAP_H; }
      const patterns = ['single', 'spread', 'circle', 'burst', 'double', 'spiral', 'shotgun', 'cross', 'sniper'];
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      enemies.push({ x, y, hp: diff.enemyHp, shootTimer: Math.floor(Math.random() * 90), angle: 0, pattern, burstCount: 0, burstTimer: 0, rotAngle: Math.random() * Math.PI * 2 });
    }

    function drawEnemyFace(x, y, angle, pattern) {
      const R = ENEMY_RADIUS;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle + Math.PI / 2);

      if (pattern === 'sniper') {
        // Elongated purple sniper
        ctx.fillStyle = '#2a0a4a'; ctx.strokeStyle = '#aa22ff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(0, 0, R - 4, R + 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        const sg = ctx.createRadialGradient(0, -R/3, 0, 0, 0, R);
        sg.addColorStop(0, 'rgba(180,50,255,0.4)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sg; ctx.beginPath(); ctx.ellipse(0, 0, R - 4, R + 2, 0, 0, Math.PI * 2); ctx.fill();
        // Scope eye
        ctx.fillStyle = '#1a0030'; ctx.beginPath(); ctx.arc(0, -3, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#cc44ff'; ctx.globalAlpha = 0.7; ctx.beginPath(); ctx.arc(0, -3, 5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(-5, -3); ctx.lineTo(5, -3); ctx.moveTo(0, -8); ctx.lineTo(0, 2); ctx.stroke();
        // Mouth
        ctx.strokeStyle = '#aa66ff'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(0, 8, 6, 0.3, Math.PI - 0.3); ctx.stroke();
        // Barrel
        ctx.fillStyle = '#8800cc'; ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(-2, -R - 8, 4, 10, 1); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#f0f'; ctx.globalAlpha = 0.9; ctx.beginPath(); ctx.arc(0, -R - 9, 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;

      } else if (pattern === 'spread' || pattern === 'shotgun') {
        // Star-shaped orange multi-gunner
        ctx.fillStyle = '#c85a00'; ctx.strokeStyle = '#ff8822'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a2 = (i * Math.PI) / 5 - Math.PI / 2;
          const r2 = i % 2 === 0 ? R + 4 : R - 6;
          if (i === 0) ctx.moveTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
          else ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#c85a00'; ctx.beginPath(); ctx.arc(0, 0, R - 5, 0, Math.PI * 2); ctx.fill();
        const og = ctx.createRadialGradient(-R/4, -R/4, 0, 0, 0, R);
        og.addColorStop(0, 'rgba(255,160,60,0.4)'); og.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = og; ctx.beginPath(); ctx.arc(0, 0, R - 5, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#ffe'; ctx.beginPath(); ctx.arc(-5, -3, 4, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#c40'; ctx.beginPath(); ctx.arc(-5, -2, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -2, 2, 0, Math.PI * 2); ctx.fill();
        // Angry brows
        ctx.strokeStyle = '#f80'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-9, -8); ctx.lineTo(-1, -6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(9, -8); ctx.lineTo(1, -6); ctx.stroke();
        // Mouth
        ctx.beginPath(); ctx.arc(0, 6, 6, 0.2, Math.PI - 0.2); ctx.stroke();
        // Triple barrels
        ctx.fillStyle = '#c84'; ctx.strokeStyle = '#f80'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.roundRect(-1.5, -R - 6, 3, 8, 1); ctx.fill(); ctx.stroke();
        ctx.save(); ctx.rotate(-0.42); ctx.beginPath(); ctx.roundRect(-1, -R - 4, 2.5, 7, 1); ctx.fill(); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.rotate(0.42);  ctx.beginPath(); ctx.roundRect(-1, -R - 4, 2.5, 7, 1); ctx.fill(); ctx.stroke(); ctx.restore();

      } else if (pattern === 'circle' || pattern === 'cross') {
        // Boss — 4 eyes, 4 barrels
        ctx.fillStyle = '#3a0010'; ctx.strokeStyle = '#ff0044'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        const bg2 = ctx.createRadialGradient(-R/4, -R/3, 0, 0, 0, R);
        bg2.addColorStop(0, 'rgba(255,50,80,0.5)'); bg2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bg2; ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
        // 4 eyes
        ctx.fillStyle = '#ffe';
        ctx.beginPath(); ctx.arc(-7, -5, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -5, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-10, 3, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, 3, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f04';
        ctx.beginPath(); ctx.arc(-7, -4, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -4, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-10, 3, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, 3, 1.5, 0, Math.PI * 2); ctx.fill();
        // Evil grin
        ctx.strokeStyle = '#ff4466'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 5, 9, 0.2, Math.PI - 0.2); ctx.stroke();
        // 4 radial barrels
        ctx.fillStyle = '#a00'; ctx.strokeStyle = '#f04'; ctx.lineWidth = 1;
        for (let k = 0; k < 4; k++) {
          ctx.save(); ctx.rotate(k * Math.PI / 2);
          ctx.beginPath(); ctx.roundRect(-1.5, -R - 6, 3, 8, 1); ctx.fill(); ctx.stroke();
          ctx.restore();
        }

      } else if (pattern === 'spiral') {
        // Golden dizzy spiraler
        ctx.fillStyle = '#3a2a00'; ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        const gg = ctx.createRadialGradient(-R/3, -R/3, 0, 0, 0, R);
        gg.addColorStop(0, 'rgba(255,215,0,0.45)'); gg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
        // Dizzy eyes
        ctx.fillStyle = '#ffe';
        ctx.beginPath(); ctx.arc(-7, -3, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -3, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#c80'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(-7, -3, 3.5, 0.3, Math.PI * 1.8); ctx.stroke();
        ctx.beginPath(); ctx.arc(7, -3, 3.5, 0.3, Math.PI * 1.8); ctx.stroke();
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(0, 6, 7, 0.2, Math.PI - 0.2); ctx.stroke();
        // Angled barrel
        ctx.save(); ctx.rotate(0.35);
        ctx.fillStyle = '#c80'; ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(-1.5, -R - 6, 3, 8, 1); ctx.fill(); ctx.stroke();
        ctx.restore();

      } else if (pattern === 'burst') {
        // Green hexagonal burster
        ctx.fillStyle = '#1a4a1a'; ctx.strokeStyle = '#22ff66'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a2 = (i * Math.PI / 3) - Math.PI / 6;
          if (i === 0) ctx.moveTo(Math.cos(a2) * (R + 2), Math.sin(a2) * (R + 2));
          else ctx.lineTo(Math.cos(a2) * (R + 2), Math.sin(a2) * (R + 2));
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        const hg = ctx.createRadialGradient(0, -R/3, 0, 0, 0, R);
        hg.addColorStop(0, 'rgba(50,255,100,0.35)'); hg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffe';
        ctx.beginPath(); ctx.arc(-6, -3, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -3, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0a0';
        ctx.beginPath(); ctx.arc(-6, -2, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -2, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(0, 7, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
        // Triple barrels
        ctx.fillStyle = '#0a0'; ctx.strokeStyle = '#2f6'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.roundRect(-1.5, -R - 6, 3, 8, 1); ctx.fill(); ctx.stroke();
        ctx.save(); ctx.rotate(-0.2); ctx.beginPath(); ctx.roundRect(-1, -R - 4, 2, 7, 1); ctx.fill(); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.rotate(0.2);  ctx.beginPath(); ctx.roundRect(-1, -R - 4, 2, 7, 1); ctx.fill(); ctx.stroke(); ctx.restore();

      } else if (pattern === 'double') {
        // Cyan twin-cannon
        ctx.fillStyle = '#0a2a3a'; ctx.strokeStyle = '#00ccff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        const dg = ctx.createRadialGradient(-R/3, -R/3, 0, 0, 0, R);
        dg.addColorStop(0, 'rgba(0,200,255,0.3)'); dg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = dg; ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffe';
        ctx.beginPath(); ctx.arc(-7, -3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#08f';
        ctx.beginPath(); ctx.arc(-7, -2, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -2, 2, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#0cf'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 6, 7, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.fillStyle = '#086'; ctx.strokeStyle = '#0cf'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(-6, -R - 6, 3, 8, 1); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.roundRect(3, -R - 6, 3, 8, 1); ctx.fill(); ctx.stroke();

      } else {
        // single / default — basic red demon
        ctx.fillStyle = '#8b0000'; ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        const rg = ctx.createRadialGradient(-R/3, -R/3, 0, 0, 0, R);
        rg.addColorStop(0, 'rgba(255,80,80,0.5)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffe';
        ctx.beginPath(); ctx.ellipse(-7, -3, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(7, -3, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.arc(-7, -2, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -2, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-6.5, -2.5, 1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7.5, -2.5, 1, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#f00'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-12, -8); ctx.lineTo(-3, -5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(12, -8); ctx.lineTo(3, -5); ctx.stroke();
        ctx.strokeStyle = '#f88'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 5, 8, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.fillStyle = '#660000';
        ctx.beginPath(); ctx.moveTo(-10, -R + 4); ctx.lineTo(-6, -R - 6); ctx.lineTo(-2, -R + 4); ctx.fill();
        ctx.beginPath(); ctx.moveTo(2, -R + 4); ctx.lineTo(6, -R - 6); ctx.lineTo(10, -R + 4); ctx.fill();
        ctx.fillStyle = '#c00'; ctx.strokeStyle = '#f00'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(-2.5, -R - 8, 5, 10, 1.5); ctx.fill(); ctx.stroke();
      }

      ctx.restore();
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function updateEnemies() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.angle = angle;
        e.x += Math.cos(angle) * diff.enemySpeed;
        e.y += Math.sin(angle) * diff.enemySpeed;

        if (e.burstCount > 0) {
          e.burstTimer++;
          if (e.burstTimer >= 10) {
            e.burstTimer = 0;
            e.burstCount--;
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(e.angle) * diff.bulletFast, vy: Math.sin(e.angle) * diff.bulletFast });
          }
        }

        e.shootTimer++;
        const shootCD = e.pattern === 'circle'  ? diff.shootCD + 30
                      : e.pattern === 'burst'   ? diff.shootCD + 10
                      : e.pattern === 'sniper'  ? diff.shootCD + 70
                      : e.pattern === 'spiral'  ? Math.max(18, diff.shootCD - 25)
                      : e.pattern === 'shotgun' ? diff.shootCD + 20
                      : diff.shootCD;
        e.charging = e.pattern === 'sniper' && e.shootTimer >= shootCD - 45;
        if (e.shootTimer >= shootCD) {
          e.shootTimer = 0;
          const a = angle;
          if (e.pattern === 'single') {
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 2.6, vy: Math.sin(a) * 2.6 });
          } else if (e.pattern === 'spread') {
            for (let s = -2; s <= 2; s++) {
              const sa = a + s * 0.28;
              enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * diff.bulletSlow, vy: Math.sin(sa) * diff.bulletSlow });
            }
          } else if (e.pattern === 'circle') {
            for (let k = 0; k < 6; k++) {
              const ca = (k / 8) * Math.PI * 2;
              enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ca) * diff.bulletSlow, vy: Math.sin(ca) * diff.bulletSlow });
            }
          } else if (e.pattern === 'burst') {
            e.burstCount = 3;
            e.burstTimer = 0;
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 2.6, vy: Math.sin(a) * 2.6 });
          } else if (e.pattern === 'double') {
            const px = -Math.sin(a) * 8, py = Math.cos(a) * 8;
            enemyBullets.push({ x: e.x + px, y: e.y + py, vx: Math.cos(a) * diff.bulletSlow, vy: Math.sin(a) * diff.bulletSlow });
            enemyBullets.push({ x: e.x - px, y: e.y - py, vx: Math.cos(a) * diff.bulletSlow, vy: Math.sin(a) * diff.bulletSlow });
          } else if (e.pattern === 'spiral') {
            // Bullet rotative : chaque tir tourne de ~27°, crée une spirale
            e.rotAngle += 0.47;
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(e.rotAngle) * diff.bulletSlow, vy: Math.sin(e.rotAngle) * diff.bulletSlow });
          } else if (e.pattern === 'shotgun') {
            // Large cône de 9 bullets → dévastateur à courte portée
            for (let s = -3; s <= 3; s++) {
              const sa = a + s * 0.18;
              enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * diff.bulletSlow, vy: Math.sin(sa) * diff.bulletSlow });
            }
          } else if (e.pattern === 'cross') {
            // 4 bullets : vise le joueur + 3 autres directions (90°, 180°, 270°)
            for (let k = 0; k < 4; k++) {
              const ca = a + k * (Math.PI / 2);
              enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ca) * diff.bulletSlow, vy: Math.sin(ca) * diff.bulletSlow });
            }
          } else if (e.pattern === 'sniper') {
            // Long CD mais bullet ultra-rapide — difficile à esquiver
            const speed = Math.min(4.5, diff.bulletFast * 1.25);
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed });
          }
        }

        for (let j = playerBullets.length - 1; j >= 0; j--) {
          if (dist(e, playerBullets[j]) < ENEMY_RADIUS) {
            e.hp--;
            playerBullets.splice(j, 1);
            break;
          }
        }

        if (e.hp <= 0) {
          spawnDrop(e.x, e.y);
          enemies.splice(i, 1);
          kills++;
        }
      }
    }

    function updateBullets() {
      if (player.circleFire > 0) {
        player.circleFire--;
        player.fireCDTimer++;
        if (player.fireCDTimer >= player.fireCD && player.hp > 0) {
          player.fireCDTimer = 0;
          for (let k = 0; k < 8; k++) {
            const a = (k / 8) * Math.PI * 2;
            playerBullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * 9, vy: Math.sin(a) * 9 });
          }
        }
      } else if ((mouse.down || gpFire || touchFire) && player.hp > 0) {
        player.fireCDTimer++;
        if (player.fireCDTimer >= player.fireCD) {
          player.fireCDTimer = 0;
          const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
          playerBullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 9, vy: Math.sin(angle) * 9 });
        }
      }

      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > MAP_W || b.y < 0 || b.y > MAP_H) playerBullets.splice(i, 1);
      }
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > MAP_W || b.y < 0 || b.y > MAP_H) { enemyBullets.splice(i, 1); continue; }
        if (dist(b, player) < RADIUS) {
          enemyBullets.splice(i, 1);
          player.hp = Math.max(0, player.hp - 1);
        }
      }
    }

    function drawBullets() {
      for (const b of playerBullets) {
        const speed = Math.hypot(b.vx, b.vy) || 1;
        const nx = b.vx / speed, ny = b.vy / speed;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI / 2);
        // Trail
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = '#0af';
        ctx.beginPath(); ctx.ellipse(0, 10, 3, 12, 0, 0, Math.PI * 2); ctx.fill();
        // Glow
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#0af';
        ctx.beginPath(); ctx.ellipse(0, 0, 9, 9, 0, 0, Math.PI * 2); ctx.fill();
        // Body
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0af';
        ctx.beginPath(); ctx.ellipse(0, 0, 5, 9, 0, 0, Math.PI * 2); ctx.fill();
        // Core
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.7;
        ctx.beginPath(); ctx.ellipse(0, -1, 2.5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }
      for (const b of enemyBullets) {
        ctx.save();
        // Glow
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.arc(b.x, b.y, 16, 0, Math.PI * 2); ctx.fill();
        // Body
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ff3300';
        ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI * 2); ctx.fill();
        // Highlight
        ctx.fillStyle = 'rgba(255,200,180,0.5)';
        ctx.beginPath(); ctx.arc(b.x - 2.5, b.y - 2.5, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    function hudText(text, x, y, color) {
      // Ombre portée pour lisibilité sur n'importe quel fond
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillText(text, x + 1, y + 1);
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
    }

    function drawHUD() {
      const s    = isMobile ? Math.min(MAP_W, MAP_H) / 320 : 1;
      const fs   = Math.round(14 * s);
      const pad  = Math.round(10 * s);
      const lh   = Math.round(20 * s);
      const barW = Math.round(140 * s);
      const barH = Math.round(18 * s);

      // Panneau semi-transparent gauche
      const panelW = barW + Math.round(12 * s);
      const panelH = barH + lh * 4 + Math.round(28 * s);
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath();
      ctx.roundRect(pad - 6, pad - 6, panelW, panelH, 8);
      ctx.fill();

      // Barre HP avec texte centré dedans
      const hpColor = player.hp > player.maxHp * 0.4 ? '#33dd33' : player.hp > player.maxHp * 0.2 ? '#ffaa00' : '#ff3333';
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(pad, pad, barW, barH);
      ctx.fillStyle = hpColor;
      ctx.fillRect(pad, pad, barW * (player.hp / player.maxHp), barH);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
      ctx.strokeRect(pad, pad, barW, barH);
      ctx.font = `bold ${fs}px monospace`;
      ctx.textAlign = 'center';
      hudText(`❤ ${player.hp} / ${player.maxHp}`, pad + barW / 2, pad + barH - Math.round(3 * s), 'white');
      ctx.textAlign = 'left';

      // Stats
      const y0 = pad + barH + lh;
      ctx.font = `bold ${fs}px monospace`;
      hudText(`⚡ SPD  ${player.speed.toFixed(1)}`,          pad, y0,          '#00ddff');
      hudText(`🔥 TIR  ${(60/player.fireCD).toFixed(1)}/s`,  pad, y0 + lh,     '#ffaa00');
      hudText(`☠ TUÉS ${kills}`,                              pad, y0 + lh * 2, '#ff6677');
      const niv = diff.niveau || 1;
      const nivColor = niv <= 3 ? '#88ff88' : niv <= 6 ? '#ffaa00' : '#ff4444';
      hudText(`★ NIV  ${niv}`,                                pad, y0 + lh * 3, nivColor);

      // Timer centré en haut avec fond
      const timerFont = Math.round(24 * s);
      const timerText = formatTime(finalTime);
      ctx.font = `bold ${timerFont}px monospace`;
      const tw = ctx.measureText(timerText).width;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath();
      ctx.roundRect(MAP_W / 2 - tw / 2 - 10, pad - 6, tw + 20, timerFont + 8, 8);
      ctx.fill();
      ctx.textAlign = 'center';
      hudText(timerText, MAP_W / 2, pad + timerFont - 2, 'white');
      ctx.textAlign = 'left';

      // Barre durée cercle de feu
      if (player.circleFire > 0) {
        const bW = Math.round(140 * s), bH = Math.round(10 * s);
        const bX = pad, bY = pad + barH + lh * 5 + Math.round(6 * s);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.roundRect(bX - 6, bY - 14, bW + 12, bH + 20, 6); ctx.fill();
        ctx.font = `bold ${Math.round(10 * s)}px monospace`;
        hudText('🌀 CERCLE DE FEU', bX, bY - 2, '#ff9900');
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bX, bY + 2, bW, bH);
        ctx.fillStyle = '#ff9900';
        ctx.fillRect(bX, bY + 2, bW * (player.circleFire / 1800), bH);
      }
    }

    function drawCrosshair(x, y) {
      const R = 14, gap = 4;
      ctx.save();
      ctx.strokeStyle = 'red'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - R - 6, y); ctx.lineTo(x - gap, y);
      ctx.moveTo(x + gap, y);   ctx.lineTo(x + R + 6, y);
      ctx.moveTo(x, y - R - 6); ctx.lineTo(x, y - gap);
      ctx.moveTo(x, y + gap);   ctx.lineTo(x, y + R + 6);
      ctx.stroke();
      ctx.fillStyle = 'red';
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawHead(x, y, angle) {
      const R = RADIUS;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle + Math.PI / 2);

      // Engine glow
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#0af';
      ctx.beginPath(); ctx.ellipse(0, R + 5, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Hull body
      ctx.fillStyle = '#1a3a5c'; ctx.strokeStyle = '#2af'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -R - 4);
      ctx.lineTo(R + 3, R - 1);
      ctx.lineTo(0, R - 5);
      ctx.lineTo(-R - 3, R - 1);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Wing left
      ctx.fillStyle = '#0e2a45'; ctx.strokeStyle = '#2af'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-R - 3, R - 1);
      ctx.lineTo(-R - 9, R + 7);
      ctx.lineTo(-R + 1, R + 1);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Wing right
      ctx.beginPath();
      ctx.moveTo(R + 3, R - 1);
      ctx.lineTo(R + 9, R + 7);
      ctx.lineTo(R - 1, R + 1);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Engine nozzle left
      ctx.fillStyle = '#0af'; ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.roundRect(-R + 1, R + 1, 7, 5, 2); ctx.fill();
      // Engine nozzle right
      ctx.beginPath(); ctx.roundRect(R - 8, R + 1, 7, 5, 2); ctx.fill();
      ctx.globalAlpha = 1;

      // Hull detail lines
      ctx.strokeStyle = 'rgba(40,180,255,0.3)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(0, -R); ctx.lineTo(-R, R - 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -R); ctx.lineTo(R, R - 3); ctx.stroke();

      // Cockpit
      ctx.fillStyle = '#0af'; ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.ellipse(0, -R + 7, 5, 7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(-1, -R + 6, 2, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      // Cannon
      ctx.fillStyle = '#1ef'; ctx.strokeStyle = '#0af'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(-2, -R - 10, 4, 10, 1.5); ctx.fill(); ctx.stroke();
      // Cannon tip glow
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(0, -R - 10, 2, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    function update() {
      if (isMobile && MAP_W < MAP_H) return;
      if (player.hp <= 0) {
        if (!scoreSaved) {
          saveBestTime(finalTime, kills);
          scoreSaved = true;
        }
        return;
      }
      finalTime = Date.now() - gameStartTime;
      updateDifficulty();

      let dx = 0, dy = 0;
      if (keys['z']) dy -= 1;
      if (keys['s']) dy += 1;
      if (keys['q']) dx -= 1;
      if (keys['d']) dx += 1;

      // Joysticks tactiles
      touchFire = false;
      if (joyL.active) { dx += joyL.dx; dy += joyL.dy; }
      if (joyR.active) {
        player.angle = Math.atan2(joyR.dy, joyR.dx);
        mouse.x = player.x + joyR.dx * 200;
        mouse.y = player.y + joyR.dy * 200;
        touchFire = true;
      }

      // Gamepad input
      gpFire = false;
      const gp = getGamepad();
      if (gp) {
        // Démarre la musique dès qu'une manette est détectée
        startMusic();
        // Stick gauche → déplacement
        const lx = Math.abs(gp.axes[0]) > 0.15 ? gp.axes[0] : 0;
        const ly = Math.abs(gp.axes[1]) > 0.15 ? gp.axes[1] : 0;
        dx += lx; dy += ly;

        // Stick droit → visée
        const rx = Math.abs(gp.axes[2]) > 0.15 ? gp.axes[2] : 0;
        const ry = Math.abs(gp.axes[3]) > 0.15 ? gp.axes[3] : 0;
        if (rx !== 0 || ry !== 0) {
          player.angle = Math.atan2(ry, rx);
          mouse.x = player.x + rx * 200;
          mouse.y = player.y + ry * 200;
        }

        // Gâchette droite (7), RB (5) ou A/X (0) → tir
        gpFire = gp.buttons[7]?.pressed || gp.buttons[5]?.pressed || gp.buttons[0]?.pressed;

        // Start (9) → redémarrer
        const startPressed = gp.buttons[9]?.pressed;
        if (startPressed && !gpPrevStart && player.hp <= 0) restartGame();
        gpPrevStart = startPressed;
      }

      const len = Math.hypot(dx, dy);
      if (len > 1) { dx /= len; dy /= len; }
      player.x = Math.max(RADIUS, Math.min(MAP_W - RADIUS, player.x + dx * player.speed));
      player.y = Math.max(RADIUS, Math.min(MAP_H - RADIUS, player.y + dy * player.speed));

      spawnTimer++;
      if (spawnTimer >= diff.spawnInterval) { spawnTimer = 0; if (enemies.length < 12) spawnEnemy(); }

      updateEnemies();
      updateBullets();
      updateDrops();
      updateHpHistory();
    }

    function draw() {
      // Portrait sur mobile → message de rotation
      if (isMobile && MAP_W < MAP_H) {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, MAP_W, MAP_H);
        ctx.textAlign = 'center';
        ctx.font = `${Math.round(MAP_W * 0.18)}px monospace`;
        ctx.fillStyle = 'white';
        ctx.fillText('↻', MAP_W / 2, MAP_H / 2 - MAP_W * 0.06);
        ctx.font = `bold ${Math.round(MAP_W * 0.055)}px monospace`;
        ctx.fillText('Tourne ton téléphone', MAP_W / 2, MAP_H / 2 + MAP_W * 0.04);
        ctx.fillText('en mode paysage', MAP_W / 2, MAP_H / 2 + MAP_W * 0.11);
        ctx.textAlign = 'left';
        return;
      }
      ctx.drawImage(grassCanvas, 0, 0);
      drawDrops();
      drawBullets();
      for (const e of enemies) {
        if (e.charging) {
          ctx.save();
          ctx.strokeStyle = '#ff4400';
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.4 + 0.4 * Math.sin(Date.now() / 80);
          ctx.beginPath();
          ctx.arc(e.x, e.y, ENEMY_RADIUS + 10, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        drawEnemyFace(e.x, e.y, e.angle, e.pattern);
      }
      if (player.circleFire > 0) {
        ctx.save();
        ctx.strokeStyle = '#ff9900';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.4 + 0.3 * Math.sin(Date.now() / 120);
        ctx.beginPath(); ctx.arc(player.x, player.y, RADIUS + 10, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#ff9900';
        ctx.fill();
        ctx.restore();
      }
      drawHead(player.x, player.y, player.angle);

      const barW = 44, barH = 6, barX = player.x - barW / 2, barY = player.y - RADIUS - 14;
      ctx.fillStyle = '#000';
      ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
      ctx.fillStyle = player.hp > player.maxHp * 0.4 ? '#22cc22' : player.hp > player.maxHp * 0.2 ? '#ffaa00' : '#cc2222';
      ctx.fillRect(barX, barY, barW * (player.hp / player.maxHp), barH);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(barX - 1, barY - 1, barW + 2, barH + 2);

      if (screenFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${screenFlash / 18 * 0.45})`;
        ctx.fillRect(0, 0, MAP_W, MAP_H);
        screenFlash--;
      }
      drawNotifications();
      drawHUD();
      if (!isMobile) drawCrosshair(mouse.x, mouse.y);
      drawJoysticks();

      if (player.hp <= 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, MAP_W, MAP_H);

        const cx = MAP_W / 2;
        const cy = MAP_H / 2;
        ctx.textAlign = 'center';

        const y0 = MAP_H * 0.10;

        ctx.fillStyle = 'red';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('GAME OVER', cx, y0);

        ctx.fillStyle = 'white';
        ctx.font = 'bold 20px monospace';
        ctx.fillText(`${formatTime(finalTime)}  ·  ☠ ${kills} tués`, cx, y0 + 44);

        // Graphique HP style trading
        if (hpHistory.length >= 2) {
          const cW = Math.min(500, MAP_W - 80);
          const cH = 90;
          const cX = cx - cW / 2;
          const cY = y0 + 72;
          const maxHpVal = Math.max(...hpHistory.map(p => p.hp), player.maxHp);
          const totalT   = hpHistory[hpHistory.length - 1].t || 1;

          // Fond terminal
          ctx.fillStyle = 'rgba(4,10,22,0.92)';
          ctx.beginPath(); ctx.roundRect(cX - 6, cY - 18, cW + 12, cH + 28, 6); ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(cX - 6, cY - 18, cW + 12, cH + 28, 6); ctx.stroke();

          // Label header
          ctx.textAlign = 'left';
          ctx.font = 'bold 9px monospace';
          ctx.fillStyle = 'rgba(255,255,255,0.35)';
          ctx.fillText('HP TRACKER', cX, cY - 7);
          ctx.textAlign = 'right';
          const finalHp = hpHistory[hpHistory.length - 1].hp;
          ctx.fillStyle = finalHp > maxHpVal * 0.4 ? '#00ff88' : finalHp > maxHpVal * 0.2 ? '#ffcc00' : '#ff4444';
          ctx.font = 'bold 9px monospace';
          ctx.fillText(`${finalHp} HP`, cX + cW, cY - 7);
          ctx.textAlign = 'center';

          // Grille horizontale
          ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
          for (let g = 0; g <= 4; g++) {
            const gy = cY + (g / 4) * cH;
            ctx.beginPath(); ctx.moveTo(cX, gy); ctx.lineTo(cX + cW, gy); ctx.stroke();
          }

          // Calcul points
          const pts = hpHistory.map(p => ({
            x: cX + (p.t / totalT) * cW,
            y: cY + cH - (p.hp / maxHpVal) * cH
          }));

          // Remplissage gradient sous la courbe
          const grad = ctx.createLinearGradient(0, cY, 0, cY + cH);
          grad.addColorStop(0, 'rgba(0,255,120,0.18)');
          grad.addColorStop(1, 'rgba(0,255,120,0)');
          ctx.beginPath();
          ctx.moveTo(pts[0].x, cY + cH);
          pts.forEach(p => ctx.lineTo(p.x, p.y));
          ctx.lineTo(pts[pts.length - 1].x, cY + cH);
          ctx.closePath();
          ctx.fillStyle = grad;
          ctx.fill();

          // Segments colorés : vert si HP monte, rouge si HP baisse
          ctx.lineWidth = 1.8;
          for (let i = 1; i < pts.length; i++) {
            const prev = hpHistory[i - 1].hp, curr = hpHistory[i].hp;
            ctx.strokeStyle = curr > prev ? '#00ff88' : curr < prev ? '#ff4444' : 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
            ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
          }

          // Marqueur dernier point
          ctx.fillStyle = finalHp > maxHpVal * 0.4 ? '#00ff88' : finalHp > maxHpVal * 0.2 ? '#ffcc00' : '#ff4444';
          ctx.beginPath();
          ctx.arc(pts[pts.length - 1].x, pts[pts.length - 1].y, 3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Top 3
        const best = loadBestTimes();
        const medals = ['🥇', '🥈', '🥉'];
        const chartBottom = y0 + 72 + 90 + 28;
        ctx.font = 'bold 14px monospace';
        ctx.fillStyle = '#ffdd88';
        ctx.fillText('— MEILLEURS SCORES —', cx, chartBottom + 28);
        best.forEach((e, i) => {
          ctx.fillStyle = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : '#cd7f32';
          ctx.fillText(`${medals[i]}  ${formatTime(e.ms)}  ·  ☠ ${e.kills}`, cx, chartBottom + 50 + i * 24);
        });

        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '13px monospace';
        ctx.fillText('R · Start (manette) · Tap (mobile)', cx, chartBottom + 130);
        ctx.textAlign = 'left';
      }
    }

function restartGame() {
      player.hp = BASE_MAX_HP; player.maxHp = BASE_MAX_HP;
      player.speed = BASE_SPEED; player.fireCD = BASE_FIRE_CD;
      player.fireCDTimer = 0;
      player.x = MAP_W / 2; player.y = MAP_H / 2;
      enemies.length = 0; playerBullets.length = 0;
      enemyBullets.length = 0; drops.length = 0;
      notifications.length = 0; spawnTimer = 0;
      gameStartTime = Date.now(); finalTime = 0; scoreSaved = false; kills = 0;
      hpHistory.length = 0; hpSampleTick = 0; player.circleFire = 0;
    }

    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r' && player.hp <= 0) restartGame();
    });

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
